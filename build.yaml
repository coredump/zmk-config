# This file generates the GitHub Actions matrix
# For simple board + shield combinations, add them
# to the top level board and shield arrays, for more
# control, add individual board + shield combinations to
# the `include` property, e.g:
#
include:
  - board: nice_nano
    shield: crosses_left
  - board: nice_nano
    shield: crosses_right
    snippet: studio-rpc-usb-uart
    cmake-args: |
      -DCONFIG_ZMK_STUDIO=y
  - board: xiao_ble/nrf52840
    shield: prospector_scanner
    artifact-name: prospector_scanner

  - board: xiao_ble/nrf52840
    shield: totemball_left rgbled_adapter
    artifact-name: totemball_standalone_left
  - board: xiao_ble/nrf52840
    shield: totemball_right rgbled_adapter
    artifact-name: totemball_standalone_right
    cmake-args: "-DDTS_EXTRA_CPPFLAGS=-DUSE_TB=1"
#    snippet: zmk-usb-logging
